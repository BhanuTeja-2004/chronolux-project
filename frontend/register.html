<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChronoLux — Register</title>

  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond&family=DM+Sans&display=swap" rel="stylesheet" />
</head>

<body>

<!-- NAVBAR (same as index) -->
<nav class="navbar">
  <div class="nav-inner">
    <a href="index.html" class="logo">ChronoLux</a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="index.html#collection">Collection</a></li>
      <li><a href="login.html">Login</a></li>
      <li><a href="register.html" class="active">Register</a></li>
    </ul>
  </div>
</nav>

<!-- REGISTER SECTION -->
<section class="hero" style="height: 100vh; display:flex; align-items:center; justify-content:center;">

  <div class="modal" style="display:block; position:relative; max-width:400px; width:100%;">

    <h2 class="modal-title">Create Account</h2>
    <p class="modal-sub">Join ChronoLux</p>

    <div class="form-group">
      <label>Name</label>
      <input type="text" id="regName" placeholder="Your name" />
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" id="regEmail" placeholder="Email" />
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" id="regPassword" placeholder="Password" />
    </div>

    <!-- IMPORTANT BUTTON -->
    <button id="registerBtn" class="btn btn-primary full" type="button">
      Register
    </button>

    <p class="modal-switch">
      Already have an account? <a href="login.html">Login</a>
    </p>

  </div>

</section>

<script src="auth.js"></script>
</body>
</html>
